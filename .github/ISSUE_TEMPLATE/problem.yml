name: Report a problem
description: Report a TB data-quality, reporting, guidance or workspace problem
title: "[PROBLEM] "
labels: [problem]
body:
  - type: markdown
    attributes:
      value: Give enough context to investigate the problem without sharing confidential health information.
  - type: dropdown
    id: area
    attributes:
      label: What area is affected?
      options:
        - Data quality or indicator result
        - Reporting template or calendar
        - Guidance or procedure
        - Docs website
        - GitHub workspace
        - Other
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: Reporting period
      placeholder: "Example: 2026 Q2 or June 2026"
  - type: input
    id: level
    attributes:
      label: Location or reporting level
      description: Use a programme level or non-confidential location description.
      placeholder: "Example: State summary or facility reporting level"
  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: State the observed result or problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Programme impact
      description: Explain who or what is affected and whether there is a workaround.
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Needed-by date
      placeholder: YYYY-MM-DD or Not date-sensitive
  - type: textarea
    id: evidence
    attributes:
      label: Safe supporting information
      description: Add redacted screenshots, non-confidential files, links or a related Discussion.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed patient names, IDs and other confidential health information.
          required: true
